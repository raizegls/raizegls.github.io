<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAIZE 관리자</title>
  <link rel="icon" type="image/png" href="./brand_logo/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { grass: '#76BA66', sea: '#49A18C', dark: '#333333' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    .grad-bg { background: linear-gradient(135deg, #76BA66, #49A18C); }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .status-badge:hover { opacity: .8; }
    .status-미확인  { background: #fef3c7; color: #d97706; }
    .status-확인    { background: #dbeafe; color: #2563eb; }
    .status-답변완료 { background: #dcfce7; color: #16a34a; }
    #login-screen { display: flex; }
    #admin-screen { display: none; }
    .row-hover:hover { background: #f9fafb; }
    .msg-expand { display: none; white-space: pre-wrap; margin-top: 6px; font-size: .82rem; color: #6b7280; line-height: 1.6; }
    .msg-expand.open { display: block; }
    .msg-toggle { cursor: pointer; color: #49A18C; font-size: .8rem; font-weight: 600; }
    .msg-toggle:hover { text-decoration: underline; }
    .delete-btn {
      color: #d1d5db;
      transition: color .15s;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .delete-btn:hover { color: #ef4444; }
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: .85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ── 로그인 화면 ── -->
<div id="login-screen" class="min-h-screen items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-sm text-center">
    <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl grad-bg mb-5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <h1 class="font-black text-xl text-dark mb-1">RAIZE 관리자</h1>
    <p class="text-gray-400 text-sm mb-7">비밀번호를 입력해주세요.</p>
    <input id="pw-input" type="password" placeholder="비밀번호"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-grass mb-3"
      onkeydown="if(event.key==='Enter') tryLogin()">
    <p id="pw-error" class="text-red-400 text-xs mb-3 min-h-[16px]"></p>
    <button onclick="tryLogin()"
      class="w-full grad-bg text-white font-bold py-3 rounded-xl text-sm hover:opacity-90 active:scale-95 transition-all">
      로그인
    </button>
  </div>
</div>

<!-- ── 관리자 화면 ── -->
<div id="admin-screen" class="min-h-screen">
  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg grad-bg flex items-center justify-center">
          <span class="text-white font-black text-xs">R</span>
        </div>
        <div>
          <span class="font-black text-dark text-base">RAIZE</span>
          <span class="text-gray-400 text-sm ml-2">관리자</span>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <a href="/" class="text-gray-400 text-sm hover:text-grass transition-colors">← 사이트로</a>
        <button onclick="logout()" class="text-gray-400 text-sm hover:text-red-400 transition-colors">로그아웃</button>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-6 py-8">

    <!-- 통계 카드 -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 mb-1">전체 문의</p>
        <p id="stat-total" class="text-2xl font-black text-dark">—</p>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 mb-1">미확인</p>
        <p id="stat-unread" class="text-2xl font-black" style="color:#d97706;">—</p>
      </div>
      <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 mb-1">답변완료</p>
        <p id="stat-done" class="text-2xl font-black" style="color:#16a34a;">—</p>
      </div>
    </div>

    <!-- 필터 & 새로고침 -->
    <div class="flex items-center justify-between mb-4">
      <div class="flex gap-2">
        <button onclick="setFilter('전체')" data-f="전체" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-500 hover:border-grass hover:text-grass transition-colors">전체</button>
        <button onclick="setFilter('미확인')" data-f="미확인" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-500 hover:border-grass hover:text-grass transition-colors">미확인</button>
        <button onclick="setFilter('확인')" data-f="확인" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-500 hover:border-grass hover:text-grass transition-colors">확인</button>
        <button onclick="setFilter('답변완료')" data-f="답변완료" class="filter-btn px-4 py-1.5 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-500 hover:border-grass hover:text-grass transition-colors">답변완료</button>
      </div>
      <button onclick="loadInquiries()" class="text-gray-400 text-sm hover:text-grass transition-colors flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        새로고침
      </button>
    </div>

    <!-- 목록 테이블 -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100">
            <th class="text-left text-xs text-gray-400 font-semibold px-6 py-3.5 w-28">접수일</th>
            <th class="text-left text-xs text-gray-400 font-semibold px-4 py-3.5 w-24">이름</th>
            <th class="text-left text-xs text-gray-400 font-semibold px-4 py-3.5 w-48">이메일</th>
            <th class="text-left text-xs text-gray-400 font-semibold px-4 py-3.5">문의 내용</th>
            <th class="text-left text-xs text-gray-400 font-semibold px-4 py-3.5 w-24">상태</th>
            <th class="px-4 py-3.5 w-10"></th>
          </tr>
        </thead>
        <tbody id="inquiry-tbody">
          <tr><td colspan="6" class="text-center text-gray-300 py-16 text-sm">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const SUPABASE_URL = 'https://ftchvdqpaghtanoytqtm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Y2h2ZHFwYWdodGFub3l0cXRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzkzMDUsImV4cCI6MjA4ODk1NTMwNX0.efcnujSpYslsPfrNABmktVpVv7oke6NTMOgQjxfLGo4';
  const ADMIN_PW = 'raize2026!';

  let allData = [];
  let currentFilter = '전체';

  /* ── 로그인 ── */
  function tryLogin() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PW) {
      sessionStorage.setItem('raize_admin', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadInquiries();
    } else {
      document.getElementById('pw-error').textContent = '비밀번호가 올바르지 않습니다.';
      document.getElementById('pw-input').value = '';
    }
  }

  function logout() {
    sessionStorage.removeItem('raize_admin');
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
  }

  /* ── 자동 로그인 (세션 유지) ── */
  if (sessionStorage.getItem('raize_admin') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadInquiries();
  }

  /* ── 데이터 로드 ── */
  async function loadInquiries() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/inquiries?select=*&order=created_at.desc`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      allData = await res.json();
      updateStats();
      renderTable();
    } catch {
      showToast('데이터를 불러오지 못했습니다.');
    }
  }

  /* ── 통계 ── */
  function updateStats() {
    document.getElementById('stat-total').textContent  = allData.length;
    document.getElementById('stat-unread').textContent = allData.filter(d => d.status === '미확인').length;
    document.getElementById('stat-done').textContent   = allData.filter(d => d.status === '답변완료').length;
  }

  /* ── 필터 ── */
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      const active = b.dataset.f === f;
      b.style.background = active ? '#76BA66' : '';
      b.style.color      = active ? '#fff' : '';
      b.style.borderColor = active ? '#76BA66' : '';
    });
    renderTable();
  }

  /* ── 테이블 렌더 ── */
  function renderTable() {
    const data = currentFilter === '전체' ? allData : allData.filter(d => d.status === currentFilter);
    const tbody = document.getElementById('inquiry-tbody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-gray-300 py-16 text-sm">문의 내역이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(row => {
      const date = new Date(row.created_at).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      const status = row.status || '미확인';
      const shortMsg = row.message && row.message.length > 40 ? row.message.slice(0, 40) + '…' : row.message;
      return `
        <tr class="row-hover border-b border-gray-50" id="row-${row.id}">
          <td class="px-6 py-4 text-gray-400 text-xs">${date}</td>
          <td class="px-4 py-4 font-semibold text-dark text-sm">${escHtml(row.name)}</td>
          <td class="px-4 py-4">
            <span class="text-gray-600 text-sm cursor-pointer hover:text-grass"
              onclick="navigator.clipboard.writeText('${escHtml(row.email)}').then(()=>showToast('이메일이 복사되었습니다.'))">
              ${escHtml(row.email)}
            </span>
          </td>
          <td class="px-4 py-4">
            <p class="text-gray-700 text-sm">${escHtml(shortMsg)}</p>
            ${row.message && row.message.length > 40 ? `
              <span class="msg-toggle" onclick="toggleMsg('${row.id}')">전체 보기</span>
              <p class="msg-expand" id="msg-${row.id}">${escHtml(row.message)}</p>
            ` : ''}
          </td>
          <td class="px-4 py-4">
            <span class="status-badge status-${status}" onclick="cycleStatus('${row.id}', '${status}')">${status}</span>
          </td>
          <td class="px-4 py-4 text-center">
            <button class="delete-btn" onclick="deleteRow('${row.id}')" title="삭제">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </td>
        </tr>
      `;
    }).join('');

    // 초기 필터 버튼 스타일
    document.querySelectorAll('.filter-btn').forEach(b => {
      const active = b.dataset.f === currentFilter;
      b.style.background  = active ? '#76BA66' : '';
      b.style.color       = active ? '#fff' : '';
      b.style.borderColor = active ? '#76BA66' : '';
    });
  }

  /* ── 상태 순환: 미확인 → 확인 → 답변완료 → 미확인 ── */
  const STATUS_CYCLE = { '미확인': '확인', '확인': '답변완료', '답변완료': '미확인' };

  async function cycleStatus(id, current) {
    const next = STATUS_CYCLE[current] || '미확인';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/inquiries?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status: next })
      });
      if (!res.ok) throw new Error();
      const item = allData.find(d => d.id === id);
      if (item) item.status = next;
      updateStats();
      renderTable();
      showToast(`상태가 "${next}"로 변경되었습니다.`);
    } catch {
      showToast('상태 변경에 실패했습니다.');
    }
  }

  /* ── 삭제 ── */
  async function deleteRow(id) {
    if (!confirm('이 문의를 삭제하시겠습니까?')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/inquiries?id=eq.${id}`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        }
      });
      if (!res.ok) throw new Error();
      allData = allData.filter(d => d.id !== id);
      updateStats();
      renderTable();
      showToast('삭제되었습니다.');
    } catch {
      showToast('삭제에 실패했습니다.');
    }
  }

  /* ── 문의 내용 토글 ── */
  function toggleMsg(id) {
    const el = document.getElementById('msg-' + id);
    const toggle = el.previousElementSibling;
    el.classList.toggle('open');
    toggle.textContent = el.classList.contains('open') ? '접기' : '전체 보기';
  }

  /* ── 토스트 ── */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ── XSS 방어 ── */
  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
